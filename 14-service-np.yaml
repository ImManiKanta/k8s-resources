apiVersion: v1
kind: Service
metadata:
  name: svc-np
spec:
  type: NodePort
  selector:
    project: roboshop
    environment: dev
    component: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    # Optional field
    # By default and for convenience, the Kubernetes control plane
    # will allocate a port from a range (default: 30000-32767)
    nodePort: 30007 #If you don't give port it will automatically allocate