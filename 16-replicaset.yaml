apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
  # using these labels replica set selects the pod and create replicas for that matched labels pod
    matchLabels:
      project: roboshop
      tier: frontend
      component: frontend
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx