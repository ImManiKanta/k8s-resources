apiVersion: v1
kind: Pod
metadata:
  name: resource-demo
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
     #soft limit
      requests:
        memory: "64mi" #RAM
        cpu: "100m" #CPU  
      # hard limit, how much it can go upto
      limits:
        memory: "128mi" #RAM
        cpu: "100m" #CPU  